<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0F6E56">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Minha Vida">
<title>Minha Vida</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#1D9E75;--green-dark:#0F6E56;--green-light:#E1F5EE;--green-text:#085041;
  --orange:#BA7517;--orange-light:#FAEEDA;--orange-text:#854F0B;
  --red:#D85A30;--red-light:#FAECE7;--red-text:#993C1D;
  --blue:#378ADD;--blue-light:#E6F1FB;--blue-text:#185FA5;
  --bg:#f4f6f8;--surface:#fff;--surface2:#f1f3f5;
  --border:#e5e7eb;--text:#111827;--text2:#6b7280;--text3:#9ca3af;
  --radius:12px;--radius-sm:8px;--shadow:0 1px 4px rgba(0,0,0,0.07);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:72px}
.hdr{background:linear-gradient(135deg,#0F6E56,#1D9E75 60%,#5DCAA5);padding:16px 16px 20px;color:white;position:sticky;top:0;z-index:100}
.hdr-inner{max-width:700px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.hdr-title{font-size:20px;font-weight:700}
.hdr-date{font-size:12px;color:rgba(255,255,255,0.8);margin-top:2px}
.main{max-width:700px;margin:0 auto;padding:14px}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:14px}
.mc{background:var(--surface);border-radius:var(--radius);padding:12px;box-shadow:var(--shadow);border:1px solid var(--border);text-align:center}
.mc-val{font-size:22px;font-weight:700;line-height:1}
.mc-label{font-size:11px;color:var(--text2);margin-top:3px}
.mc-sub{font-size:10px;font-weight:600;margin-top:2px}
.card{background:var(--surface);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:12px}
.card-title{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.peso-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.chip{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}
.chip-g{background:var(--green-light);color:var(--green-text)}
.chip-o{background:var(--orange-light);color:var(--orange-text)}
.chip-b{background:var(--blue-light);color:var(--blue-text)}
.row{display:flex;gap:8px;align-items:center}
.inp{flex:1;font-size:14px;padding:8px 10px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface2);color:var(--text);outline:none;font-family:inherit}
.inp:focus{border-color:var(--green)}
.btn{background:var(--green);color:white;border:none;border-radius:var(--radius-sm);padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn:active{opacity:0.85}
.btn-red{background:#E24B4A}
.btn-outline{background:transparent;color:var(--green);border:1.5px solid var(--green)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-ghost{background:rgba(255,255,255,0.2);color:white;border:none}
.peso-log{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-top:10px}
.peso-log::-webkit-scrollbar{display:none}
.pe{background:var(--surface2);border-radius:var(--radius-sm);padding:6px 8px;text-align:center;min-width:54px;flex-shrink:0}
.pe-date{font-size:10px;color:var(--text2)}
.pe-val{font-size:13px;font-weight:700}
.pe-diff{font-size:10px;font-weight:700}
.c-dn{color:var(--green)}.c-up{color:#E24B4A}
.bar-wrap{margin-top:10px}
.bar-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:3px}
.bar-track{height:7px;background:var(--surface2);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.bar-fill{height:100%;background:var(--green);border-radius:4px;transition:width 0.5s}
.tabs-wrap{background:var(--surface);border-radius:var(--radius);padding:4px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:10px;display:flex;gap:2px;overflow-x:auto}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab{font-size:12px;padding:7px 10px;border-radius:8px;border:none;background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit;font-weight:500;flex-shrink:0}
.tab.active{background:var(--green);color:white;font-weight:700}
.tab-cnt{font-size:10px;padding:1px 5px;border-radius:8px;font-weight:700;margin-left:2px}
.tab.active .tab-cnt{background:rgba(255,255,255,0.25);color:white}
.tab:not(.active) .tab-cnt{background:var(--surface2);color:var(--text2)}
.toolbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.fb{font-size:12px;padding:4px 11px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;font-weight:500}
.fb.on{background:var(--text);color:white;border-color:var(--text)}
.sort-btn{font-size:12px;padding:4px 11px;border-radius:20px;border:1.5px solid var(--blue);background:var(--blue-light);color:var(--blue-text);cursor:pointer;font-family:inherit;font-weight:600}
.sort-btn.on{background:var(--blue);color:white;border-color:var(--blue)}
.frente{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
.fh{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.fh:active{background:var(--surface2)}
.fdot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.ftitle{font-size:14px;font-weight:600;flex:1}
.fpct{font-size:12px;font-weight:700;color:var(--text2)}
.chev{font-size:10px;color:var(--text3);transition:transform 0.2s;margin-left:2px}
.chev.op{transform:rotate(90deg)}
.pbar-wrap{height:3px;background:var(--surface2);margin:0 14px;border-radius:2px}
.pbar{height:100%;border-radius:2px;transition:width 0.4s}
.tasks{display:none;padding:4px 0 6px}
.tasks.op{display:block}
.task{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-top:1px solid var(--border);cursor:pointer}
.task:active{background:var(--surface2)}
.tcheck{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;background:var(--surface)}
.tcheck.dn{background:var(--green);border-color:var(--green)}
.tcheck.dn::after{content:'';display:block;width:9px;height:6px;border-left:2.5px solid white;border-bottom:2.5px solid white;transform:rotate(-45deg) translate(1px,-1px)}
.tbody{flex:1;min-width:0}
.ttext{font-size:13px;line-height:1.4}
.ttext.dn{color:var(--text3);text-decoration:line-through}
.tnote{font-size:11px;color:var(--text2);margin-top:1px}
.tmeta{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;align-items:center}
.badge{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600}
.p1{background:var(--red-light);color:var(--red-text)}
.p2{background:var(--orange-light);color:var(--orange-text)}
.p3{background:var(--green-light);color:var(--green-text)}
.dbadge{font-size:10px;padding:2px 7px;border-radius:6px;background:var(--surface2);color:var(--text2);font-weight:500}
.dbadge.soon{background:var(--orange-light);color:var(--orange-text)}
.dbadge.late{background:var(--red-light);color:var(--red-text)}
.empty{text-align:center;padding:2rem;color:var(--text2);font-size:13px}
.plan-toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:580px}
thead tr{background:var(--surface2)}
th{padding:9px 10px;text-align:left;font-weight:600;color:var(--text2);border-bottom:2px solid var(--border);white-space:nowrap;cursor:pointer}
th:hover{background:#e8eaed}
td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
td input[type=text],td input[type=date],td select{font-size:12px;padding:4px 6px;border:1.5px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-family:inherit;width:100%;outline:none}
td input:focus,td select:focus{border-color:var(--green)}
.tag{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600;white-space:nowrap}
.action-btns{display:flex;gap:4px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius);padding:20px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px}
.field{margin-bottom:12px}
.field label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;font-size:14px;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-family:inherit;outline:none}
.field input:focus,.field select:focus{border-color:var(--green)}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btns button{flex:1}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:200}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:8px 0;color:var(--text2);font-size:10px;font-weight:500;border:none;background:transparent;font-family:inherit}
.bn.active{color:var(--green)}
.bn-icon{font-size:20px}
.view{display:none}
.view.active{display:block}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-inner">
    <div>
      <div class="hdr-title">Minha Vida</div>
      <div class="hdr-date" id="hdr-date"></div>
    </div>
    <button class="btn btn-sm btn-ghost" onclick="openModal()">+ Tarefa</button>
  </div>
</div>

<div class="main">

  <div class="view active" id="view-dash">
    <div class="metrics" id="metrics"></div>
    <div id="peso-card"></div>
    <div class="tabs-wrap" id="tabs"></div>
    <div class="toolbar">
      <button class="fb on" onclick="setFilter('all',this)">Todas</button>
      <button class="fb" onclick="setFilter('pending',this)">Pendentes</button>
      <button class="fb" onclick="setFilter('done',this)">Concluídas</button>
      <button class="fb" onclick="setFilter('alta',this)">Urgentes</button>
      <button class="sort-btn" id="sort-btn" onclick="toggleSort()">📅 Por data</button>
    </div>
    <div id="frentes-main"></div>
  </div>

  <div class="view" id="view-peso">
    <div id="peso-full"></div>
  </div>

  <div class="view" id="view-plan">
    <div class="card">
      <div class="card-title">📊 Planilha — edite diretamente aqui</div>
      <div class="plan-toolbar">
        <button class="btn btn-sm" onclick="openModal()">+ Nova tarefa</button>
        <select class="inp" style="max-width:160px" id="plan-fg" onchange="renderPlan()">
          <option value="">Todas as frentes</option>
        </select>
        <select class="inp" style="max-width:140px" id="plan-sort" onchange="renderPlan()">
          <option value="frente">Ordenar: Frente</option>
          <option value="due">Ordenar: Vencimento</option>
          <option value="p">Ordenar: Prioridade</option>
          <option value="status">Ordenar: Status</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th style="width:32px">✓</th>
            <th>Frente</th>
            <th>Tarefa</th>
            <th style="width:100px">Prioridade</th>
            <th style="width:130px">Vencimento</th>
            <th>Nota</th>
            <th style="width:80px">Ações</th>
          </tr></thead>
          <tbody id="plan-body"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<div class="bnav">
  <button class="bn active" onclick="setView('dash',this)"><div class="bn-icon">🏠</div>Dashboard</button>
  <button class="bn" onclick="setView('peso',this)"><div class="bn-icon">⚖️</div>Peso</button>
  <button class="bn" onclick="setView('plan',this)"><div class="bn-icon">📊</div>Planilha</button>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="modal-title">Nova tarefa</h3>
    <div class="field"><label>Tarefa *</label><input id="m-text" placeholder="Descrição da tarefa"/></div>
    <div class="field"><label>Frente *</label><select id="m-frente"></select></div>
    <div class="field"><label>Prioridade</label>
      <select id="m-p">
        <option value="alta">🔴 Alta (urgente)</option>
        <option value="media" selected>🟡 Média</option>
        <option value="baixa">🟢 Baixa</option>
      </select>
    </div>
    <div class="field"><label>Data de vencimento</label><input type="date" id="m-due"/></div>
    <div class="field"><label>Nota / observação</label><input id="m-note" placeholder="Opcional"/></div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn" onclick="saveModal()">Salvar</button>
    </div>
  </div>
</div>

<script>
const S={get:k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))};

const grupos=[

const defaultData=[

let data=S.get('mv_tasks')||defaultData;
let pesoLog=S.get('mv_peso')||[];
let activeGrupo=S.get('mv_grupo')||'todas';
let activeFilter='all';
let sortByDate=false;
let activeView='dash';
let editingTask=null;

const save=()=>S.set('mv_tasks',data);
const savePeso=()=>S.set('mv_peso',pesoLog);
const uid=()=>Math.random().toString(36).slice(2,9);
const todayD=new Date();todayD.setHours(0,0,0,0);
const daysFrom=str=>{if(!str)return null;const d=new Date(str);d.setHours(0,0,0,0);return Math.round((d-todayD)/86400000)};
const fmtDate=str=>{if(!str)return'';const d=new Date(str);return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})};
const pCls={alta:'p1',media:'p2',baixa:'p3'};
const pLbl={alta:'Alta',media:'Média',baixa:'Baixa'};
const pOrd={alta:0,media:1,baixa:2};

function allTasks(){
  const rows=[];
  data.forEach(f=>f.tasks.forEach(t=>rows.push({...t,fid:f.id,ftitle:f.title,fcolor:f.color,fgrupo:f.grupo})));
  return rows;
}

function setView(v,btn){
  activeView=v;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('.bn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(v==='plan'){renderPlanFiltros();renderPlan();}
  if(v==='peso')renderPesoFull();
}

function renderMetrics(){
  let total=0,done=0,urgent=0,soon=0;
  allTasks().forEach(t=>{
    total++;if(t.done)done++;
    if(!t.done&&t.p==='alta')urgent++;
    const d=daysFrom(t.due);if(!t.done&&d!==null&&d<=7)soon++;
  });
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('metrics').innerHTML=`
    <div class="mc"><div class="mc-val" style="color:var(--green)">${done}</div><div class="mc-label">Feitas</div><div class="mc-sub" style="color:var(--green)">${pct}%</div></div>
    <div class="mc"><div class="mc-val" style="color:var(--orange)">${total-done}</div><div class="mc-label">Pendentes</div><div class="mc-sub" style="color:var(--red-text)">${urgent} urgentes</div></div>
    <div class="mc"><div class="mc-val" style="color:var(--red)">${soon}</div><div class="mc-label">Esta semana</div><div class="mc-sub" style="color:var(--text2)">${data.length} frentes</div></div>
    <div class="mc"><div class="mc-val">${total}</div><div class="mc-label">Total</div><div class="mc-sub" style="color:var(--text2)">${pct}% ok</div></div>`;
}

function addPeso(inputId){
  const inp=document.getElementById(inputId);
  const v=parseFloat(inp.value);
  if(isNaN(v)||v<40||v>300){alert('Digite um peso válido (ex: 92.5)');return;}
  const today=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  const idx=pesoLog.findIndex(p=>p.date===today);
  if(idx>=0)pesoLog[idx].val=v;else pesoLog.push({date:today,val:v});
  inp.value='';savePeso();renderPesoCard();
  if(activeView==='peso')renderPesoFull();
}

function pesoStats(){
  const first=pesoLog.length?pesoLog[0].val:null;
  const last=pesoLog.length?pesoLog[pesoLog.length-1].val:null;
  const diff=(first&&last)?+(last-first).toFixed(1):null;
  const pct=diff!==null?Math.min(100,Math.max(0,Math.round(Math.abs(diff)/10*100))):0;
  return{first,last,diff,pct};
}

function renderPesoCard(){
  const{first,last,diff,pct}=pesoStats();
  const logHtml=pesoLog.slice().reverse().slice(0,8).map((p,i,arr)=>{
    const prev=arr[i+1];let dh='';
    if(prev){const d=+(p.val-prev.val).toFixed(1);dh=`<div class="pe-diff ${d<=0?'c-dn':'c-up'}">${d<=0?'▼':'▲'}${Math.abs(d)}</div>`;}
    return `<div class="pe"><div class="pe-date">${p.date}</div><div class="pe-val">${p.val}</div>${dh}</div>`;
  }).join('');
  document.getElementById('peso-card').innerHTML=`<div class="card">
    <div class="card-title">⚖️ Tracker de peso</div>
    <div class="peso-chips">
      <span class="chip chip-b">Atual: ${last?last+' kg':'—'}</span>
      <span class="chip chip-o">${diff!==null?(diff<=0?'Perda':'Ganho')+': '+Math.abs(diff)+' kg':'Perda: —'}</span>
      <span class="chip chip-g">Meta: −10 kg até 9/mai</span>
    </div>
    <div class="row"><input class="inp" type="number" id="pinput" placeholder="Peso hoje (ex: 92.5)" step="0.1" min="40" max="300" inputmode="decimal"/><button class="btn btn-sm" onclick="addPeso('pinput')">Registrar</button></div>
    ${pesoLog.length?`<div class="peso-log">${logHtml}</div><div class="bar-wrap"><div class="bar-labels"><span>Início: ${first} kg</span><span>${pct}% da meta</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div></div>`:'<div style="font-size:12px;color:var(--text2);margin-top:8px">Nenhum registro ainda. Pese-se toda manhã!</div>'}
  </div>`;
}

function renderPesoFull(){
  const{first,last,diff,pct}=pesoStats();
  const rows=pesoLog.slice().reverse().map((p,i,arr)=>{
    const prev=arr[i+1];let dTxt='—',dColor='var(--text2)';
    if(prev){const d=+(p.val-prev.val).toFixed(1);dTxt=(d<=0?'▼ ':'▲ ')+Math.abs(d);dColor=d<=0?'var(--green)':'#E24B4A';}
    return `<tr><td>${p.date}</td><td><strong>${p.val} kg</strong></td><td style="color:${dColor};font-weight:700">${dTxt}</td>
      <td><button class="btn btn-red btn-sm" onclick="deletePeso('${p.date}')">✕</button></td></tr>`;
  }).join('');
  document.getElementById('peso-full').innerHTML=`
    <div class="card">
      <div class="card-title">⚖️ Registrar peso</div>
      <div class="peso-chips">
        <span class="chip chip-b">Atual: ${last?last+' kg':'—'}</span>
        <span class="chip chip-o">${diff!==null?(diff<=0?'Perda':'Ganho')+': '+Math.abs(diff)+' kg':'—'}</span>
        <span class="chip chip-g">Meta: −10 kg até 9/mai</span>
      </div>
      <div class="row"><input class="inp" type="number" id="pinput2" placeholder="Peso hoje (ex: 92.5)" step="0.1" min="40" max="300" inputmode="decimal"/><button class="btn" onclick="addPeso('pinput2')">Registrar</button></div>
      ${pesoLog.length?`<div class="bar-wrap" style="margin-top:12px"><div class="bar-labels"><span>Início: ${first} kg</span><span>${pct}% da meta (−10 kg)</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div></div>`:''}
    </div>
    <div class="card" style="margin-top:12px">
      <div class="card-title">📅 Histórico completo</div>
      ${pesoLog.length?`<div class="table-wrap" style="min-width:0"><table style="min-width:0"><thead><tr><th>Data</th><th>Peso</th><th>Variação</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div style="font-size:13px;color:var(--text2)">Nenhum registro ainda.</div>'}
    </div>`;
}

function deletePeso(date){
  if(!confirm('Remover registro de '+date+'?'))return;
  pesoLog=pesoLog.filter(p=>p.date!==date);savePeso();renderPesoFull();renderPesoCard();
}

function renderTabs(){
  document.getElementById('tabs').innerHTML=grupos.map(g=>{
    const cnt=g.id==='todas'
      ?allTasks().filter(t=>!t.done).length
      :data.filter(f=>f.grupo===g.id).reduce((a,f)=>a+f.tasks.filter(t=>!t.done).length,0);
    return `<button class="tab ${g.id===activeGrupo?'active':''}" onclick="setTab('${g.id}')">${g.icon} ${g.label}${cnt>0?`<span class="tab-cnt">${cnt}</span>`:''}</button>`;
  }).join('');
}

function setTab(gid){activeGrupo=gid;S.set('mv_grupo',gid);renderTabs();renderDash();}
function setFilter(f,btn){activeFilter=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderDash();}
function toggleSort(){sortByDate=!sortByDate;document.getElementById('sort-btn').classList.toggle('on',sortByDate);renderDash();}

function taskVis(t){
  if(activeFilter==='pending')return !t.done;
  if(activeFilter==='done')return t.done;
  if(activeFilter==='alta')return t.p==='alta'&&!t.done;
  return true;
}

function toggleTask(fid,tid){
  const f=data.find(f=>f.id===fid);const t=f.tasks.find(t=>t.id===tid);t.done=!t.done;
  save();renderMetrics();renderTabs();renderDash();
}
function toggleFrente(fid){const f=data.find(f=>f.id===fid);f.open=!f.open;save();renderDash();}

function taskRowHtml(fid,t,showFrente){
  const d=daysFrom(t.due);
  let dcls='dbadge',dtxt='';
  if(t.due){dtxt=fmtDate(t.due);if(d<0){dcls+=' late';dtxt='Atrasada';}else if(d===0){dcls+=' soon';dtxt='Hoje';}else if(d===1){dcls+=' soon';dtxt='Amanhã';}else if(d<=7)dcls+=' soon';}
  const frente=data.find(f=>f.id===fid);
  return `<div class="task" onclick="toggleTask('${fid}','${t.id}')">
    <div class="tcheck ${t.done?'dn':''}"></div>
    <div class="tbody">
      <div class="ttext ${t.done?'dn':''}">${t.text}</div>
      ${t.note?`<div class="tnote">${t.note}</div>`:''}
      <div class="tmeta">
        ${t.p?`<span class="badge ${pCls[t.p]}">${pLbl[t.p]}</span>`:''}
        ${dtxt?`<span class="${dcls}">${dtxt}</span>`:''}
        ${showFrente&&frente?`<span style="font-size:10px;color:${frente.color};font-weight:600">${frente.title}</span>`:''}
      </div>
    </div>
  </div>`;
}

function renderDash(){
  const el=document.getElementById('frentes-main');
  const isTodas=activeGrupo==='todas';

  if(isTodas&&sortByDate){
    let tasks=allTasks().filter(t=>taskVis(t));
    tasks.sort((a,b)=>{if(!a.due&&!b.due)return 0;if(!a.due)return 1;if(!b.due)return -1;return new Date(a.due)-new Date(b.due);});
    if(!tasks.length){el.innerHTML=`<div class="empty">Nenhuma tarefa com este filtro.</div>`;return;}
    el.innerHTML=`<div class="frente"><div class="tasks op">${tasks.map(t=>taskRowHtml(t.fid,t,true)).join('')}</div></div>`;
    return;
  }

  let frentes=isTodas?data:data.filter(f=>f.grupo===activeGrupo);
  frentes=frentes.filter(f=>f.tasks.some(t=>taskVis(t)));
  if(!frentes.length){el.innerHTML=`<div class="empty">Nenhuma tarefa com este filtro.</div>`;return;}

  el.innerHTML=frentes.map(frente=>{
    let vt=frente.tasks.filter(t=>taskVis(t));
    if(sortByDate)vt=[...vt].sort((a,b)=>{if(!a.due&&!b.due)return 0;if(!a.due)return 1;if(!b.due)return -1;return new Date(a.due)-new Date(b.due);});
    const tot=frente.tasks.length,dn=frente.tasks.filter(t=>t.done).length;
    const pct=tot?Math.round(dn/tot*100):0;
    return `<div class="frente">
      <div class="fh" onclick="toggleFrente('${frente.id}')">
        <div class="fdot" style="background:${frente.color}"></div>
        <div class="ftitle">${frente.title}</div>
        <span class="fpct">${pct}% · ${dn}/${tot}</span>
        <span class="chev ${frente.open?'op':''}">▶</span>
      </div>
      <div class="pbar-wrap"><div class="pbar" style="width:${pct}%;background:${frente.color}"></div></div>
      <div class="tasks ${frente.open?'op':''}">${vt.map(t=>taskRowHtml(frente.id,t,isTodas)).join('')}</div>
    </div>`;
  }).join('');
}

function renderPlanFiltros(){
  document.getElementById('plan-fg').innerHTML='<option value="">Todas as frentes</option>'+data.map(f=>`<option value="${f.id}">${f.title}</option>`).join('');
}

function renderPlan(){
  const fid=document.getElementById('plan-fg').value;
  const sort=document.getElementById('plan-sort').value;
  let rows=allTasks();
  if(fid)rows=rows.filter(r=>r.fid===fid);
  rows=[...rows].sort((a,b)=>{
    if(sort==='due'){if(!a.due&&!b.due)return 0;if(!a.due)return 1;if(!b.due)return -1;return new Date(a.due)-new Date(b.due);}
    if(sort==='p')return pOrd[a.p]-pOrd[b.p];
    if(sort==='status')return a.done-b.done;
    return a.ftitle.localeCompare(b.ftitle);
  });
  document.getElementById('plan-body').innerHTML=rows.map(t=>{
    const d=daysFrom(t.due);
    let dStyle='';
    if(t.due&&d<0)dStyle='color:var(--red-text);font-weight:700';
    else if(t.due&&d<=3)dStyle='color:var(--orange-text);font-weight:700';
    return `<tr>
      <td style="text-align:center"><input type="checkbox" ${t.done?'checked':''} onchange="planToggle('${t.fid}','${t.id}',this.checked)" style="width:16px;height:16px;cursor:pointer"/></td>
      <td><span class="tag" style="background:${t.fcolor}22;color:${t.fcolor}">${t.ftitle}</span></td>
      <td><input type="text" value="${t.text.replace(/"/g,'&quot;')}" onblur="planEdit('${t.fid}','${t.id}','text',this.value)" style="min-width:160px"/></td>
      <td><select onchange="planEdit('${t.fid}','${t.id}','p',this.value)">
        <option value="alta" ${t.p==='alta'?'selected':''}>🔴 Alta</option>
        <option value="media" ${t.p==='media'?'selected':''}>🟡 Média</option>
        <option value="baixa" ${t.p==='baixa'?'selected':''}>🟢 Baixa</option>
      </select></td>
      <td style="${dStyle}"><input type="date" value="${t.due||''}" onchange="planEdit('${t.fid}','${t.id}','due',this.value)"/></td>
      <td><input type="text" value="${(t.note||'').replace(/"/g,'&quot;')}" placeholder="—" onblur="planEdit('${t.fid}','${t.id}','note',this.value)" style="min-width:100px"/></td>
      <td><div class="action-btns">
        <button class="btn btn-outline btn-sm" onclick="editTask('${t.fid}','${t.id}')">✏️</button>
        <button class="btn btn-red btn-sm" onclick="deleteTask('${t.fid}','${t.id}')">✕</button>
      </div></td>
    </tr>`;
  }).join('');
}

function planToggle(fid,tid,checked){
  data.find(f=>f.id===fid).tasks.find(t=>t.id===tid).done=checked;
  save();renderMetrics();renderTabs();renderDash();
}
function planEdit(fid,tid,field,val){
  data.find(f=>f.id===fid).tasks.find(t=>t.id===tid)[field]=val;
  save();renderMetrics();renderTabs();renderDash();
}
function deleteTask(fid,tid){
  if(!confirm('Excluir esta tarefa?'))return;
  const f=data.find(f=>f.id===fid);f.tasks=f.tasks.filter(t=>t.id!==tid);
  save();renderMetrics();renderTabs();renderDash();renderPlan();
}

function openModal(fid,tid){
  editingTask=fid&&tid?{fid,tid}:null;
  document.getElementById('modal-title').textContent=editingTask?'Editar tarefa':'Nova tarefa';
  document.getElementById('m-frente').innerHTML=data.map(f=>`<option value="${f.id}">${f.title}</option>`).join('');
  if(editingTask){
    const f=data.find(f=>f.id===fid);const t=f.tasks.find(t=>t.id===tid);
    document.getElementById('m-text').value=t.text||'';
    document.getElementById('m-frente').value=fid;
    document.getElementById('m-p').value=t.p||'media';
    document.getElementById('m-due').value=t.due||'';
    document.getElementById('m-note').value=t.note||'';
  } else {
    document.getElementById('m-text').value='';
    document.getElementById('m-p').value='media';
    document.getElementById('m-due').value='';
    document.getElementById('m-note').value='';
    const f=activeGrupo!=='todas'?data.find(f=>f.grupo===activeGrupo):null;
    if(f)document.getElementById('m-frente').value=f.id;
  }
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('m-text').focus(),100);
}

function editTask(fid,tid){openModal(fid,tid);}
function closeModal(){document.getElementById('modal').classList.remove('open');editingTask=null;}

function saveModal(){
  const text=document.getElementById('m-text').value.trim();
  if(!text){alert('Digite o nome da tarefa');return;}
  const fid=document.getElementById('m-frente').value;
  const p=document.getElementById('m-p').value;
  const due=document.getElementById('m-due').value||'';
  const note=document.getElementById('m-note').value.trim();
  if(editingTask){
    if(editingTask.fid!==fid){
      const oldF=data.find(f=>f.id===editingTask.fid);
      const t=oldF.tasks.find(t=>t.id===editingTask.tid);
      oldF.tasks=oldF.tasks.filter(t=>t.id!==editingTask.tid);
      t.text=text;t.p=p;t.due=due;t.note=note;
      data.find(f=>f.id===fid).tasks.push(t);
    } else {
      const t=data.find(f=>f.id===editingTask.fid).tasks.find(t=>t.id===editingTask.tid);
      t.text=text;t.p=p;t.due=due;t.note=note;
    }
  } else {
    data.find(f=>f.id===fid).tasks.push({id:uid(),text,done:false,p,due,note});
  }
  save();closeModal();renderMetrics();renderTabs();renderDash();
  if(activeView==='plan')renderPlan();
}

document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
renderMetrics();renderPesoCard();renderTabs();renderDash();
</script>
</body>
</html>
