<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0F6E56">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Minha Vida">
<title>Minha Vida</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#1D9E75;--green-dark:#0F6E56;--green-light:#E1F5EE;--green-text:#085041;
  --orange:#BA7517;--orange-light:#FAEEDA;--orange-text:#854F0B;
  --red:#D85A30;--red-light:#FAECE7;--red-text:#993C1D;
  --blue:#378ADD;--blue-light:#E6F1FB;--blue-text:#185FA5;
  --bg:#f4f6f8;--surface:#fff;--surface2:#f1f3f5;
  --border:#e5e7eb;--text:#111827;--text2:#6b7280;--text3:#9ca3af;
  --radius:12px;--radius-sm:8px;--shadow:0 1px 4px rgba(0,0,0,0.07);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:72px}
.hdr{background:linear-gradient(135deg,#0F6E56,#1D9E75 60%,#5DCAA5);padding:16px 16px 20px;color:white;position:sticky;top:0;z-index:100}
.hdr-inner{max-width:700px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:8px}
.hdr-title{font-size:20px;font-weight:700}
.hdr-date{font-size:12px;color:rgba(255,255,255,0.8);margin-top:2px}
.hdr-btns{display:flex;gap:6px;flex-shrink:0}
.main{max-width:700px;margin:0 auto;padding:14px}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:14px}
.mc{background:var(--surface);border-radius:var(--radius);padding:12px 8px;box-shadow:var(--shadow);border:1px solid var(--border);text-align:center;cursor:pointer;transition:border-color 0.15s}
.mc:hover{border-color:var(--green)}
.mc-val{font-size:20px;font-weight:700;line-height:1}
.mc-label{font-size:10px;color:var(--text2);margin-top:3px}
.mc-sub{font-size:10px;font-weight:600;margin-top:2px}
.card{background:var(--surface);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:12px}
.card-title{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.card-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.chip{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}
.chip-g{background:var(--green-light);color:var(--green-text)}
.chip-o{background:var(--orange-light);color:var(--orange-text)}
.chip-b{background:var(--blue-light);color:var(--blue-text)}
.chip-r{background:var(--red-light);color:var(--red-text)}
.row{display:flex;gap:8px;align-items:center}
.inp{flex:1;font-size:14px;padding:8px 10px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface2);color:var(--text);outline:none;font-family:inherit}
.inp:focus{border-color:var(--green)}
.inp-sm{font-size:12px;padding:5px 8px}
.btn{background:var(--green);color:white;border:none;border-radius:var(--radius-sm);padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn:active{opacity:0.85}
.btn-red{background:#E24B4A}
.btn-orange{background:var(--orange)}
.btn-outline{background:transparent;color:var(--green);border:1.5px solid var(--green)}
.btn-ghost{background:rgba(255,255,255,0.2);color:white;border:none}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 7px;font-size:11px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.stat-box{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;text-align:center}
.stat-val{font-size:20px;font-weight:700;color:var(--text)}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px}
.stat-sub{font-size:11px;font-weight:600;margin-top:2px}
.bar-wrap{margin-top:10px}
.bar-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:3px}
.bar-track{height:7px;background:var(--surface2);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.bar-fill{height:100%;border-radius:4px;transition:width 0.5s}
.peso-log{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-top:10px}
.peso-log::-webkit-scrollbar{display:none}
.pe{background:var(--surface2);border-radius:var(--radius-sm);padding:6px 8px;text-align:center;min-width:54px;flex-shrink:0}
.pe-date{font-size:10px;color:var(--text2)}
.pe-val{font-size:13px;font-weight:700}
.pe-diff{font-size:10px;font-weight:700}
.c-dn{color:var(--green)}.c-up{color:#E24B4A}
.section-sep{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.imc-box{border-radius:var(--radius-sm);padding:10px 14px;margin-top:10px;text-align:center}
.imc-val{font-size:26px;font-weight:700}
.imc-label{font-size:13px;font-weight:600;margin-top:2px}
.imc-range{font-size:11px;color:var(--text2);margin-top:2px}
.tabs-wrap{background:var(--surface);border-radius:var(--radius);padding:4px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:10px;display:flex;gap:2px;overflow-x:auto}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab{font-size:12px;padding:7px 10px;border-radius:8px;border:none;background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit;font-weight:500;flex-shrink:0}
.tab.active{background:var(--green);color:white;font-weight:700}
.tab-cnt{font-size:10px;padding:1px 5px;border-radius:8px;font-weight:700;margin-left:2px}
.tab.active .tab-cnt{background:rgba(255,255,255,0.25);color:white}
.tab:not(.active) .tab-cnt{background:var(--surface2);color:var(--text2)}
.toolbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.fb{font-size:12px;padding:4px 11px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;font-weight:500}
.fb.on{background:var(--text);color:white;border-color:var(--text)}
.fb.on-red{background:#E24B4A;color:white;border-color:#E24B4A}
.sort-btn{font-size:12px;padding:4px 11px;border-radius:20px;border:1.5px solid var(--blue);background:var(--blue-light);color:var(--blue-text);cursor:pointer;font-family:inherit;font-weight:600}
.sort-btn.on{background:var(--blue);color:white;border-color:var(--blue)}
.frente{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
.fh{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.fh:active{background:var(--surface2)}
.fdot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.ftitle{font-size:14px;font-weight:600;flex:1}
.fsubtitle{font-size:11px;color:var(--text2);font-weight:400}
.fpct{font-size:12px;font-weight:700;color:var(--text2)}
.chev{font-size:10px;color:var(--text3);transition:transform 0.2s;margin-left:2px}
.chev.op{transform:rotate(90deg)}
.pbar-wrap{height:3px;background:var(--surface2);margin:0 14px;border-radius:2px}
.pbar{height:100%;border-radius:2px;transition:width 0.4s}
.tasks{display:none;padding:4px 0 6px}
.tasks.op{display:block}
.task{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-top:1px solid var(--border);cursor:pointer}
.task:active{background:var(--surface2)}
.tcheck{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;background:var(--surface)}
.tcheck.dn{background:var(--green);border-color:var(--green)}
.tcheck.dn::after{content:'';display:block;width:9px;height:6px;border-left:2.5px solid white;border-bottom:2.5px solid white;transform:rotate(-45deg) translate(1px,-1px)}
.tbody{flex:1;min-width:0}
.ttext{font-size:13px;line-height:1.4}
.ttext.dn{color:var(--text3);text-decoration:line-through}
.tnote{font-size:11px;color:var(--text2);margin-top:1px}
.tmeta{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;align-items:center}
.dbadge{font-size:10px;padding:2px 7px;border-radius:6px;background:var(--surface2);color:var(--text2);font-weight:500}
.dbadge.soon{background:var(--orange-light);color:var(--orange-text)}
.dbadge.late{background:var(--red-light);color:var(--red-text);font-weight:700}
.rec-badge{font-size:10px;padding:2px 7px;border-radius:6px;background:#E6F1FB;color:#185FA5;font-weight:500}
.empty{text-align:center;padding:2rem;color:var(--text2);font-size:13px}
.pdot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
/* PLANILHA */
.plan-filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:580px}
thead tr{background:var(--surface2)}
th{padding:9px 10px;text-align:left;font-weight:600;color:var(--text2);border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
td input[type=text],td input[type=date]{font-size:12px;padding:4px 6px;border:1.5px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-family:inherit;width:100%;outline:none}
td select{font-size:12px;padding:3px 5px;border:1.5px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text);font-family:inherit;outline:none}
td input:focus,td select:focus{border-color:var(--green)}
.tag{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600;white-space:nowrap}
.action-btns{display:flex;gap:4px}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:300;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:20px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px}
.field{margin-bottom:12px}
.field label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;font-size:14px;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-family:inherit;outline:none}
.field input:focus,.field select:focus{border-color:var(--green)}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btns button{flex:1}
.frente-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.frente-item:last-child{border-bottom:none}
.coloropt{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:200}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:8px 0;color:var(--text2);font-size:10px;font-weight:500;border:none;background:transparent;font-family:inherit}
.bn.active{color:var(--green)}
.bn-icon{font-size:20px}
.view{display:none}
.view.active{display:block}
.color-swatch{width:20px;height:20px;border-radius:50%;display:inline-block;flex-shrink:0;cursor:pointer;border:2px solid transparent}
.recurrence-box{background:var(--surface2);border-radius:var(--radius-sm);padding:10px;margin-top:8px}
.toast{position:fixed;bottom:84px;left:16px;right:16px;transform:none;background:#111827;color:white;border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:13px;font-weight:500;z-index:500;box-shadow:0 4px 16px rgba(0,0,0,0.25);opacity:0;pointer-events:none;transition:opacity 0.25s,transform 0.25s;transform:translateY(8px)}
.toast.show{opacity:1;pointer-events:all;transform:translateY(0)}
.toast-btn{background:var(--green);color:white;border:none;border-radius:6px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-inner">
    <div>
      <div class="hdr-title">Minha Vida</div>
      <div class="hdr-date" id="hdr-date"></div>
    </div>
    <div class="hdr-btns">
      <button class="btn btn-sm btn-ghost" onclick="openModal('task')">+ Tarefa</button>
      <button class="btn btn-sm btn-ghost" onclick="openModal('config')">⚙️</button>
    </div>
  </div>
</div>

<div class="main">

  <!-- DASHBOARD -->
  <div class="view active" id="view-dash">
    <div class="metrics" id="metrics"></div>
    <div id="peso-card"></div>
    <div class="tabs-wrap" id="tabs"></div>
    <div class="toolbar">
      <button class="fb on" id="fb-all" onclick="setFilter('all',this)">Todas</button>
      <button class="fb" id="fb-pending" onclick="setFilter('pending',this)">Pendentes</button>
      <button class="fb" id="fb-late" onclick="setFilter('late',this)">Atrasadas</button>
      <button class="fb" id="fb-done" onclick="setFilter('done',this)">Concluídas</button>
      <button class="fb" id="fb-alta" onclick="setFilter('alta',this)">Urgentes</button>
      <button class="sort-btn" id="sort-btn" onclick="toggleSort()">📅 Por data</button>
    </div>
    <div id="frentes-main"></div>
  </div>

  <!-- MEU CORPO -->
  <div class="view" id="view-peso">
    <div id="corpo-full"></div>
  </div>

  <!-- PLANILHA -->
  <div class="view" id="view-plan">
    <div class="card">
      <div class="card-title-row">
        <div class="card-title" style="margin:0">📊 Planilha — edite diretamente aqui</div>
        <button class="btn btn-sm" onclick="openModal('task')">+ Nova tarefa</button>
      </div>
      <div class="plan-filters">
        <select class="inp inp-sm" style="max-width:180px" id="plan-fg" onchange="renderPlan()">
          <option value="">Todas as frentes</option>
        </select>
        <select class="inp inp-sm" style="max-width:160px" id="plan-sort" onchange="renderPlan()">
          <option value="frente">Ordenar por frente</option>
          <option value="due">Ordenar por vencimento</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th style="width:30px">✓</th>
            <th>Frente</th>
            <th>Subgrupo</th>
            <th>Tarefa</th>
            <th style="width:110px">Prioridade</th>
            <th style="width:120px">Vencimento</th>
            <th>Nota</th>
            <th style="width:70px">Ações</th>
          </tr></thead>
          <tbody id="plan-body"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<div class="bnav">
  <button class="bn active" onclick="setView('dash',this)"><div class="bn-icon">🏠</div>Dashboard</button>
  <button class="bn" onclick="setView('peso',this)"><div class="bn-icon">💪</div>Meu corpo</button>
  <button class="bn" onclick="setView('plan',this)"><div class="bn-icon">📊</div>Planilha</button>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>

<div class="toast" id="undo-toast">
  <div style="display:flex;flex-direction:column;gap:2px">
    <span style="font-size:12px;color:rgba(255,255,255,0.7)">Tarefa recorrente avançada</span>
    <span id="undo-toast-label" style="font-size:13px;font-weight:600"></span>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="toast-btn" onclick="undoRecurrence()">↩ Desfazer</button>
    <button onclick="dismissToast()" style="background:transparent;border:none;color:rgba(255,255,255,0.6);font-size:18px;cursor:pointer;padding:0 4px;line-height:1">×</button>
  </div>
</div>

// ── STATE ────────────────────────────────────────────────
// Migração inteligente: preserva dados do usuário e só adiciona o que falta
function migrateData(){
  // Grupos: mantém os salvos, adiciona novos grupos padrão que ainda não existam
  let savedGrupos=S.get('mv_grupos');
  if(savedGrupos&&Array.isArray(savedGrupos)){
    GRUPOS_DEF.forEach(def=>{
      if(!savedGrupos.find(g=>g.id===def.id))savedGrupos.push(def);
    });
    S.set('mv_grupos',savedGrupos);
  }
  // Frentes: mantém as salvas, adiciona novas padrão que ainda não existam
  let savedFrentes=S.get('mv_frentes');
  if(savedFrentes&&Array.isArray(savedFrentes)){
    FRENTES_DEF.forEach(def=>{
      if(!savedFrentes.find(f=>f.id===def.id))savedFrentes.push(def);
    });
    S.set('mv_frentes',savedFrentes);
  }
  // Tasks: mantém as salvas, adiciona tarefas padrão de frentes novas
  let savedTasks=S.get('mv_tasks');
  if(savedTasks&&typeof savedTasks==='object'){
    Object.keys(TASKS_DEF).forEach(fid=>{
      if(savedTasks[fid]===undefined)savedTasks[fid]=TASKS_DEF[fid];
    });
    S.set('mv_tasks',savedTasks);
  }
  S.set('mv_version','6');
}
if(S.get('mv_version')!=='6'&&S.get('mv_version')!==null){
  // Usuário já tem dados salvos de versão anterior — migra sem apagar
  migrateData();
} else if(S.get('mv_version')==='6'){
  // Versão atual, não faz nada
} else {
  // Primeira vez (sem nada salvo) — só marca versão
  S.set('mv_version','6');
}

const fmtDateBR=str=>{if(!str)return'—';const d=new Date(str);return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})};

// Retorna a cor da frente-mãe de um subgrupo
function getFrenteColor(fid){
  const f=frentes.find(f=>f.id===fid);
  if(!f)return'#888';
  const g=grupos.find(g=>g.id===f.grupo);
  return g?g.color:'#888';
}

function getGrupoColor(gid){
  const g=grupos.find(g=>g.id===gid);
  return g?g.color:'#888';
}

function allTasksFlat(){
  const rows=[];
  frentes.forEach(f=>{
    const g=grupos.find(g=>g.id===f.grupo)||{label:f.grupo,color:'#888'};

      ...t,fid:f.id,ftitle:f.title,fgrupo:f.grupo,

function renderMetrics(){
  const all=allTasksFlat();
  let total=0,done=0,urgent=0,soon=0,late=0;
  all.forEach(t=>{
    total++;if(t.done)done++;
    if(!t.done&&t.p==='alta')urgent++;
    const d=daysFrom(t.due);
    if(!t.done&&d!==null&&d<0)late++;
    if(!t.done&&d!==null&&d>=0&&d<=7)soon++;
  });
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('metrics').innerHTML=`
    <div class="mc" onclick="setFilterMc('done')"><div class="mc-val" style="color:var(--green)">${done}</div><div class="mc-label">Feitas</div><div class="mc-sub" style="color:var(--green)">${pct}%</div></div>
    <div class="mc" onclick="setFilterMc('pending')"><div class="mc-val" style="color:var(--orange)">${total-done}</div><div class="mc-label">Pendentes</div><div class="mc-sub" style="color:var(--text2)">${urgent} urgentes</div></div>
    <div class="mc" onclick="setFilterMc('late')"><div class="mc-val" style="color:#E24B4A">${late}</div><div class="mc-label">Atrasadas</div><div class="mc-sub" style="color:#E24B4A">${late>0?'Atenção!':'Em dia'}</div></div>
    <div class="mc" onclick="setFilterMc('all')"><div class="mc-val">${total}</div><div class="mc-label">Total</div><div class="mc-sub" style="color:var(--text2)">${soon} p/ semana</div></div>`;
}

// ── PESO ─────────────────────────────────────────────────
function pesoStats(){
  const first=pesoLog.length?pesoLog[0].val:null;
  const last=pesoLog.length?pesoLog[pesoLog.length-1].val:null;
  const diff=(first!=null&&last!=null)?+(last-first).toFixed(1):null;
  const metaKg=parseFloat(metaPeso.kg)||10;
  const pct=diff!==null?Math.min(100,Math.max(0,Math.round(Math.abs(diff)/metaKg*100))):0;
  const diasRestantes=metaPeso.dataFim?daysFrom(metaPeso.dataFim):null;
  return{first,last,diff,pct,metaKg,diasRestantes};
}
function addPeso(inputId){
  const inp=document.getElementById(inputId);
  const v=parseFloat(inp.value);
  if(isNaN(v)||v<30||v>300){alert('Digite um peso válido');return;}
  const today=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  const idx=pesoLog.findIndex(p=>p.date===today);
  if(idx>=0)pesoLog[idx].val=v;else pesoLog.push({date:today,val:v});
  inp.value='';savePeso();renderPesoCard();
  if(activeView==='peso')renderCorpoFull();
}
function addGordura(inputId){
  const inp=document.getElementById(inputId);
  const v=parseFloat(inp.value);
  if(isNaN(v)||v<1||v>70){alert('Digite um percentual válido');return;}
  const today=new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  const idx=gorduraLog.findIndex(p=>p.date===today);
  if(idx>=0)gorduraLog[idx].val=v;else gorduraLog.push({date:today,val:v});
  inp.value='';saveGordura();renderCorpoFull();
}

// ── IMC ───────────────────────────────────────────────────
function calcIMC(peso,altura){
  if(!peso||!altura)return null;
  let h=parseFloat(String(altura).replace(',','.'));
  if(h>3)h=h/100;
  if(h<=0)return null;
  return+(peso/(h*h)).toFixed(1);
}
function imcClass(imc,sexo){
  if(!imc)return{label:'—',color:'var(--text2)',bg:'var(--surface2)'};
  const limNormal=sexo==='M'?25:24;
  if(imc<18.5)return{label:'Abaixo do peso',color:'#185FA5',bg:'#E6F1FB'};
  if(imc<limNormal)return{label:'Peso normal ✓',color:'#085041',bg:'#E1F5EE'};
  if(imc<30)return{label:'Sobrepeso',color:'#854F0B',bg:'#FAEEDA'};
  if(imc<35)return{label:'Obesidade grau I',color:'#993C1D',bg:'#FAECE7'};
  if(imc<40)return{label:'Obesidade grau II',color:'#7B1010',bg:'#FFCCCC'};
  return{label:'Obesidade grau III',color:'#5c0a0a',bg:'#FFB3B3'};
}
function gorduraClass(pct,sexo){
  if(pct==null)return null;
  if(sexo==='M'){
    if(pct<6)return{label:'Abaixo do mínimo',color:'#185FA5'};
    if(pct<=13)return{label:'Atlético',color:'#085041'};
    if(pct<=20)return{label:'Saudável ✓',color:'#1D9E75'};
    if(pct<=25)return{label:'Aceitável',color:'#854F0B'};
    return{label:'Excesso de gordura',color:'#993C1D'};
  }else{
    if(pct<14)return{label:'Abaixo do mínimo',color:'#185FA5'};
    if(pct<=20)return{label:'Atlético',color:'#085041'};
    if(pct<=28)return{label:'Saudável ✓',color:'#1D9E75'};
    if(pct<=35)return{label:'Aceitável',color:'#854F0B'};
    return{label:'Excesso de gordura',color:'#993C1D'};
  }
}

function renderTabs(){
  const gruposAtivos=grupos.filter(g=>{
    if(g.id==='todas')return true;
    return frentes.filter(f=>f.grupo===g.id).some(f=>(tasks[f.id]||[]).length>0);
  });
  document.getElementById('tabs').innerHTML=gruposAtivos.map(g=>{
    const cnt=g.id==='todas'
      ?allTasksFlat().filter(t=>!t.done).length
      :frentes.filter(f=>f.grupo===g.id).reduce((a,f)=>a+(tasks[f.id]||[]).filter(t=>!t.done).length,0);
    return `<button class="tab ${g.id===activeGrupo?'active':''}" onclick="setTab('${g.id}')">${g.icon} ${g.label}${cnt>0?`<span class="tab-cnt">${cnt}</span>`:''}</button>`;
  }).join('');
}
function setTab(gid){activeGrupo=gid;S.set('mv_grupo',gid);renderTabs();renderDash();}
function setFilter(f,btn){
  activeFilter=f;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on','on-red'));
  if(f==='late')btn.classList.add('on-red');else btn.classList.add('on');
  renderDash();
}
function toggleSort(){sortByDate=!sortByDate;document.getElementById('sort-btn').classList.toggle('on',sortByDate);renderDash();}

function taskVis(t){
  const d=daysFrom(t.due);
  if(activeFilter==='pending')return !t.done;
  if(activeFilter==='done')return t.done;
  if(activeFilter==='alta')return t.p==='alta'&&!t.done;
  if(activeFilter==='late')return !t.done&&d!==null&&d<0;
  return true;
}

// ── DASH ─────────────────────────────────────────────────
function nextRecurrenceDate(dueDateStr,period){
  const d=new Date(dueDateStr);
  if(period==='diario')   d.setDate(d.getDate()+1);
  else if(period==='semanal')  d.setDate(d.getDate()+7);
  else if(period==='quinzenal')d.setDate(d.getDate()+15);
  else if(period==='mensal')   d.setMonth(d.getMonth()+1);
  return d.toISOString().split('T')[0];
}

let undoState=null;
let undoTimer=null;

function showUndoToast(taskText){
  const toast=document.getElementById('undo-toast');
  const label=document.getElementById('undo-toast-label');
  if(label)label.textContent=taskText||'';
  toast.classList.add('show');
  if(undoTimer)clearTimeout(undoTimer);
  undoTimer=setTimeout(()=>dismissToast(),5000);
}

function dismissToast(){
  document.getElementById('undo-toast').classList.remove('show');
  undoState=null;
  if(undoTimer)clearTimeout(undoTimer);
}

function undoRecurrence(){
  if(!undoState)return;
  const t=(tasks[undoState.fid]||[]).find(t=>t.id===undoState.tid);
  if(!t)return;
  t.due=undoState.prevDue;
  t.recurrence.count=undoState.prevCount;
  t.recurrence.history=undoState.prevHistory;
  undoState=null;
  dismissToast();
  saveTasks();renderMetrics();renderTabs();renderDash();
}

function toggleTask(fid,tid){
  const t=(tasks[fid]||[]).find(t=>t.id===tid);if(!t)return;
  const wasActive=t.recurrence&&t.recurrence.active;

  if(!t.done&&wasActive){
    // Guarda estado anterior para desfazer
    undoState={fid,tid,prevDue:t.due,prevCount:t.recurrence.count||0,prevHistory:[...(t.recurrence.history||[])]};
    // Registra histórico, avança data e reseta para pendente
    if(!t.recurrence.history)t.recurrence.history=[];
    t.recurrence.history.push(new Date().toISOString().split('T')[0]);
    t.recurrence.count=(t.recurrence.count||0)+1;
    t.due=nextRecurrenceDate(t.due,t.recurrence.period);
    t.done=false;
    showUndoToast(t.text);
  } else {
    t.done=!t.done;
  }
  saveTasks();renderMetrics();renderTabs();renderDash();
}
function toggleFrente(fid){
  const f=frentes.find(f=>f.id===fid);if(!f)return;f.open=!f.open;saveFrente();renderDash();
}

function taskRowHtml(fid,t,showGrupo){
  const d=daysFrom(t.due);
  let dcls='dbadge',dtxt='';
  if(t.due){
    dtxt=fmtDate(t.due);
    if(d<0){dcls+=' late';dtxt='Atrasada';}
    else if(d===0){dcls+=' soon';dtxt='Hoje';}
    else if(d===1){dcls+=' soon';dtxt='Amanhã';}
    else if(d<=7)dcls+=' soon';
  }
  const color=getFrenteColor(fid);
  const fr=frentes.find(f=>f.id===fid);
  const isOrphan=fid==='sem-subgrupo';
  return `<div class="task" onclick="toggleTask('${fid}','${t.id}')">
    <div class="tcheck ${t.done?'dn':''}"></div>
    <div class="tbody">
      <div class="ttext ${t.done?'dn':''}">${t.text}</div>
      ${t.note?`<div class="tnote">${t.note}</div>`:''}
      <div class="tmeta">
        <span class="pdot" style="background:${pColors[t.p]||'#888'}" title="${pLbl[t.p]||''}"></span>
        ${dtxt?`<span class="${dcls}">${dtxt}</span>`:''}
        ${t.recurrence&&t.recurrence.active?`<span class="rec-badge">↻ ${recPeriodLbl[t.recurrence.period]||t.recurrence.period}${t.recurrence.count?` · ${t.recurrence.count}×`:''}</span>`:''}
        ${isOrphan?`<span style="font-size:10px;background:#FAEEDA;color:#854F0B;padding:2px 7px;border-radius:6px;font-weight:600">⚠️ Sem subgrupo</span>`:''}
        ${showGrupo&&fr&&!isOrphan?`<span style="font-size:10px;color:${color};font-weight:600">${fr.title}</span>`:''}
      </div>
    </div>
  </div>`;
}

function sortTasks(arr){
  if(!sortByDate)return arr;
  // Ordena por data, e dentro do mesmo dia por prioridade
  return[...arr].sort((a,b)=>{
    const dA=a.due?new Date(a.due).getTime():Infinity;
    const dB=b.due?new Date(b.due).getTime():Infinity;
    if(dA!==dB)return dA-dB;
    return pOrd[a.p]-pOrd[b.p]; // alta primeiro
  });
}

function renderDash(){
  const el=document.getElementById('frentes-main');
  const isTodas=activeGrupo==='todas';

  if(isTodas&&sortByDate){
    const ts=sortTasks(allTasksFlat().filter(t=>taskVis(t)));
    if(!ts.length){el.innerHTML=`<div class="empty">Nenhuma tarefa com este filtro.</div>`;return;}
    el.innerHTML=`<div class="frente"><div class="tasks op">${ts.map(t=>taskRowHtml(t.fid,t,true)).join('')}</div></div>`;
    return;
  }

  let frentesShow=isTodas?frentes:frentes.filter(f=>f.grupo===activeGrupo);
  frentesShow=frentesShow.filter(f=>(tasks[f.id]||[]).some(t=>taskVis(t)));
  if(!frentesShow.length){el.innerHTML=`<div class="empty">Nenhuma tarefa com este filtro.</div>`;return;}

  el.innerHTML=frentesShow.map(frente=>{
    const g=grupos.find(g=>g.id===frente.grupo)||{label:'',color:'#888'};
    const color=g.color;
    let vt=(tasks[frente.id]||[]).filter(t=>taskVis(t));
    if(sortByDate)vt=sortTasks(vt);
    const tot=(tasks[frente.id]||[]).length;
    const dn=(tasks[frente.id]||[]).filter(t=>t.done).length;
    const pct=tot?Math.round(dn/tot*100):0;
    return `<div class="frente">
      <div class="fh" onclick="toggleFrente('${frente.id}')">
        <div class="fdot" style="background:${color}"></div>
        <div style="flex:1;min-width:0">
          <div class="ftitle">${frente.title}</div>
          ${isTodas?`<div class="fsubtitle">${g.label}</div>`:''}
        </div>
        <span class="fpct">${pct}% · ${dn}/${tot}</span>
        <span class="chev ${frente.open?'op':''}">▶</span>
      </div>
      <div class="pbar-wrap"><div class="pbar" style="width:${pct}%;background:${color}"></div></div>
      <div class="tasks ${frente.open?'op':''}">${vt.map(t=>taskRowHtml(frente.id,t,false)).join('')}</div>
    </div>`;
  }).join('');
}

function renderPlanFiltros(){

    }</optgroup>`).join('');

function renderPlan(){
  const fid=document.getElementById('plan-fg').value;
  const sort=document.getElementById('plan-sort').value;
  let rows=allTasksFlat();
  if(fid)rows=rows.filter(r=>r.fid===fid);
  rows=[...rows].sort((a,b)=>{
    if(sort==='due'){
      if(!a.due&&!b.due)return(a.fgLabel+a.ftitle).localeCompare(b.fgLabel+b.ftitle);
      if(!a.due)return 1;if(!b.due)return -1;
      const dd=new Date(a.due)-new Date(b.due);
      return dd!==0?dd:pOrd[a.p]-pOrd[b.p];
    }
    const fg=(a.fgLabel+a.ftitle).localeCompare(b.fgLabel+b.ftitle);
    return fg!==0?fg:pOrd[a.p]-pOrd[b.p];
  });

  document.getElementById('plan-body').innerHTML=rows.map(t=>{
    const d=daysFrom(t.due);
    let dStyle='';
    if(t.due&&d<0)dStyle='color:var(--red-text);font-weight:700';
    else if(t.due&&d!==null&&d<=3)dStyle='color:var(--orange-text);font-weight:700';
    const color=t.fColor||'#888';
    const isOrphan=t.fid==='sem-subgrupo';
    // Opções de subgrupos para o select
    const subOpts=frentes.map(f=>{
      const g=grupos.find(g=>g.id===f.grupo)||{label:''};
      return `<option value="${f.id}" ${t.fid===f.id?'selected':''}>${g.label} — ${f.title}</option>`;
    }).join('');
    return `<tr ${isOrphan?'style="background:#FAEEDA22"':''}>
      <td style="text-align:center"><input type="checkbox" ${t.done?'checked':''} onchange="planToggle('${t.fid}','${t.id}',this.checked)" style="width:15px;height:15px;cursor:pointer"/></td>
      <td><span class="tag" style="background:${color}22;color:${color}">${t.fgLabel}</span></td>
      <td>
        <select onchange="planMoveTask('${t.fid}','${t.id}',this.value)" style="width:100%;min-width:120px;font-size:11px">
          ${subOpts}
        </select>
      </td>
      <td><input type="text" value="${(t.text||'').replace(/"/g,'&quot;')}" onblur="planEdit('${t.fid}','${t.id}','text',this.value)" style="min-width:130px"/></td>
      <td>
        <select onchange="planEdit('${t.fid}','${t.id}','p',this.value)" style="width:100%">
          <option value="alta" ${t.p==='alta'?'selected':''}>🔴 Alta</option>
          <option value="media" ${t.p==='media'?'selected':''}>🟡 Média</option>
          <option value="baixa" ${t.p==='baixa'?'selected':''}>🟢 Baixa</option>
        </select>
      </td>
      <td style="${dStyle}"><input type="date" value="${t.due||''}" onchange="planEdit('${t.fid}','${t.id}','due',this.value)"/></td>
      <td><input type="text" value="${(t.note||'').replace(/"/g,'&quot;')}" placeholder="—" onblur="planEdit('${t.fid}','${t.id}','note',this.value)" style="min-width:80px"/></td>
      <td><div class="action-btns">
        <button class="btn btn-outline btn-xs" onclick="openEditTask('${t.fid}','${t.id}')">✏️</button>
        <button class="btn btn-red btn-xs" onclick="deleteTask('${t.fid}','${t.id}')">✕</button>
      </div></td>
    </tr>`;
  }).join('');
}

function planToggle(fid,tid,checked){
  const t=(tasks[fid]||[]).find(t=>t.id===tid);if(t)t.done=checked;
  saveTasks();renderMetrics();renderTabs();renderDash();
}
function planEdit(fid,tid,field,val){
  const t=(tasks[fid]||[]).find(t=>t.id===tid);if(t)t[field]=val;
  saveTasks();renderMetrics();renderTabs();renderDash();
}
function planMoveTask(oldFid,tid,newFid){
  if(oldFid===newFid)return;
  const oldList=tasks[oldFid]||[];
  const t=oldList.find(t=>t.id===tid);
  if(!t)return;
  tasks[oldFid]=oldList.filter(t=>t.id!==tid);
  if(!tasks[newFid])tasks[newFid]=[];
  tasks[newFid].push(t);
  saveTasks();renderMetrics();renderTabs();renderDash();renderPlan();
}
function deleteTask(fid,tid){
  if(!confirm('Excluir esta tarefa?'))return;
  tasks[fid]=(tasks[fid]||[]).filter(t=>t.id!==tid);
  saveTasks();renderMetrics();renderTabs();renderDash();renderPlan();
}

      <label>Repetir tarefa?</label>
      <select id="m-rec-active" onchange="toggleRecFields()">
        <option value="0" ${!rec.active?'selected':''}>Não repetir</option>
        <option value="1" ${rec.active?'selected':''}>Sim, repetir</option>
      </select>
    </div>
    <div id="rec-fields" style="display:${rec.active?'block':'none'}">
      <div class="recurrence-box">
        <div class="field" style="margin-bottom:8px"><label>Período</label>
          <select id="m-rec-period">
            <option value="diario" ${rec.period==='diario'?'selected':''}>Diário</option>
            <option value="semanal" ${rec.period==='semanal'?'selected':''}>Semanal</option>
            <option value="quinzenal" ${rec.period==='quinzenal'?'selected':''}>Quinzenal</option>
            <option value="mensal" ${rec.period==='mensal'?'selected':''}>Mensal</option>
          </select>
        </div>
        <div style="font-size:12px;color:var(--text2)">A tarefa aparecerá com o ícone ↻ indicando que é recorrente. Cada vez que for marcada como concluída, o contador de repetições aumenta.</div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn" onclick="saveTaskModal()">Salvar</button>
    </div>`;
  setTimeout(()=>document.getElementById('m-text').focus(),80);
}

function toggleRecFields(){
  const v=document.getElementById('m-rec-active').value;
  document.getElementById('rec-fields').style.display=v==='1'?'block':'none';
}

function saveTaskModal(){
  const text=(document.getElementById('m-text').value||'').trim();
  if(!text){alert('Digite o nome da tarefa');return;}
  const fid=document.getElementById('m-frente').value;
  const p=document.getElementById('m-p').value;
  const due=document.getElementById('m-due').value||'';
  const note=(document.getElementById('m-note').value||'').trim();
  const recActive=document.getElementById('m-rec-active').value==='1';
  const recPeriod=document.getElementById('m-rec-period')?document.getElementById('m-rec-period').value:'semanal';

  // Validação: recorrência exige data
  if(recActive&&!due){
    alert('Tarefas recorrentes precisam de uma data de vencimento.\nPor favor, defina uma data antes de ativar a repetição.');
    return;
  }

  const recurrence=recActive?{active:true,period:recPeriod,count:0,history:[]}:null;

  if(editingTask){
    if(editingTask.fid!==fid){
      const oldList=tasks[editingTask.fid]||[];
      const t=oldList.find(t=>t.id===editingTask.tid);
      tasks[editingTask.fid]=oldList.filter(t=>t.id!==editingTask.tid);
      if(t){t.text=text;t.p=p;t.due=due;t.note=note;t.recurrence=recurrence;if(!tasks[fid])tasks[fid]=[];tasks[fid].push(t);}
    }else{
      const t=(tasks[fid]||[]).find(t=>t.id===editingTask.tid);
      if(t){t.text=text;t.p=p;t.due=due;t.note=note;t.recurrence=recurrence;}
    }
  }else{
    if(!tasks[fid])tasks[fid]=[];
    tasks[fid].push({id:uid(),text,done:false,p,due,note,recurrence});
  }
  saveTasks();closeModal();renderMetrics();renderTabs();renderDash();
  if(activeView==='plan')renderPlan();
}

  c.innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <button class="btn btn-outline btn-sm" onclick="renderConfigModal(document.getElementById('modal-content'))">← Voltar</button>
      <strong style="font-size:14px">Frentes</strong>
    </div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:10px">A cor de cada frente é herdada por todos os seus subgrupos.</div>
    <div id="grupos-list">
      ${gruposEdit.map(g=>`
        <div class="frente-item">
          <div class="color-swatch" style="background:${g.color}"></div>
          <span style="font-size:14px;flex:1">${g.icon} ${g.label}</span>
          <button class="btn btn-outline btn-xs" onclick="startEditGrupo('${g.id}')">Editar</button>
          <button class="btn btn-red btn-xs" onclick="deleteGrupo('${g.id}')">✕</button>
        </div>`).join('')}
    </div>
    <div class="section-sep" style="margin-top:14px">Nova frente</div>
    <div class="field"><label>Nome</label><input id="ng-name" placeholder="Ex: Projetos"/></div>
    <div class="field"><label>Ícone (emoji)</label><input id="ng-icon" placeholder="Ex: 🚀" maxlength="2"/></div>
    <div class="field"><label>Cor</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap;padding:4px 0" id="ng-colors">
        ${CORES.map((cor,i)=>`<div class="coloropt" onclick="selectColorGrupo('${cor}')" id="ngco-${i}" style="background:${cor};${i===0?'border-color:var(--text)':''}"></div>`).join('')}
      </div>
    </div>
    <button class="btn" style="width:100%;margin-bottom:8px" onclick="addGrupo()">+ Criar frente</button>
    <button class="btn btn-outline" style="width:100%" onclick="closeModal()">Fechar</button>`;
  selectedColor=CORES[0];
}

function startEditGrupo(gid){
  editingGrupoId=gid;
  const g=grupos.find(g=>g.id===gid);
  const c=document.getElementById('config-section');
  c.innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <button class="btn btn-outline btn-sm" onclick="renderGruposConfig()">← Voltar</button>
      <strong style="font-size:14px">Editar frente: ${g.label}</strong>
    </div>
    <div class="field"><label>Nome</label><input id="eg-name" value="${g.label}"/></div>
    <div class="field"><label>Ícone (emoji)</label><input id="eg-icon" value="${g.icon}" maxlength="2"/></div>
    <div class="field"><label>Cor (todos os subgrupos herdarão)</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap;padding:4px 0" id="eg-colors">
        ${CORES.map((cor,i)=>{
          const sel=cor===g.color;
          return `<div class="coloropt" onclick="selectColorEdit('${cor}','eg')" id="egco-${i}" style="background:${cor};${sel?'border-color:var(--text)':''}"></div>`;
        }).join('')}
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-red" onclick="deleteGrupo('${gid}')">Excluir frente</button>
      <button class="btn" onclick="saveGrupo()">Salvar</button>
    </div>`;
  selectedColor=g.color;
}

function selectColorEdit(cor,prefix){
  selectedColor=cor;
  document.querySelectorAll(`[id^="${prefix}co-"]`).forEach(el=>{
    const idx=parseInt(el.id.replace(prefix+'co-',''));
    el.style.borderColor=CORES[idx]===cor?'var(--text)':'transparent';
  });
}
function selectColorGrupo(cor){selectColorEdit(cor,'ngco');}

function addGrupo(){
  const name=(document.getElementById('ng-name').value||'').trim();
  const icon=(document.getElementById('ng-icon').value||'📌').trim();
  if(!name){alert('Digite o nome da frente');return;}
  const ng={id:'g'+uid(),label:name,icon,color:selectedColor};
  grupos.push(ng);saveGrupos();
  renderGruposConfig();renderTabs();renderDash();
}

function saveGrupo(){
  const g=grupos.find(g=>g.id===editingGrupoId);if(!g)return;
  g.label=(document.getElementById('eg-name').value||g.label).trim();
  g.icon=(document.getElementById('eg-icon').value||g.icon).trim();
  g.color=selectedColor;
  saveGrupos();renderGruposConfig();renderTabs();renderDash();
  if(activeView==='plan')renderPlan();
}

function deleteGrupo(gid){
  const subs=frentes.filter(f=>f.grupo===gid);
  const totalTasks=subs.reduce((a,f)=>a+(tasks[f.id]||[]).length,0);
  let msg=`Excluir esta frente?`;
  if(subs.length>0){
    msg+=`\n\n${subs.length} subgrupo(s) e ${totalTasks} tarefa(s) serão mantidos, mas ficarão sem frente definida até que você os reatribua.`;
  }
  if(!confirm(msg))return;

  // Garante que existe o grupo órfão
  ensureOrphanGroup();

  // Move subgrupos para o grupo órfão
  subs.forEach(f=>{ f.grupo='sem-frente'; });
  saveFrente();

  grupos=grupos.filter(g=>g.id!==gid);
  saveGrupos();renderGruposConfig();renderTabs();renderDash();
  if(activeView==='plan')renderPlan();
}

// ── GERENCIAR SUBGRUPOS (frentes) ─────────────────────────
function renderFrentesConfig(){
  const c=document.getElementById('config-section');
  const gruposEdit=grupos.filter(g=>g.id!=='todas');
  c.innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <button class="btn btn-outline btn-sm" onclick="renderConfigModal(document.getElementById('modal-content'))">← Voltar</button>
      <strong style="font-size:14px">Subgrupos</strong>
    </div>
    <div id="frentes-list">
      ${frentes.map(f=>{
        const g=grupos.find(g=>g.id===f.grupo)||{label:'',color:'#888'};
        return `<div class="frente-item">
          <div style="width:10px;height:10px;border-radius:50%;background:${g.color};flex-shrink:0"></div>
          <span style="font-size:11px;color:var(--text2);width:65px;flex-shrink:0">${g.label}</span>
          <span style="flex:1;font-size:13px">${f.title}</span>
          <button class="btn btn-outline btn-xs" onclick="startEditFrente('${f.id}')">Editar</button>
          <button class="btn btn-red btn-xs" onclick="deleteFrente('${f.id}')">✕</button>
        </div>`;
      }).join('')}
    </div>
    <div class="section-sep" style="margin-top:14px">Novo subgrupo</div>
    <div class="field"><label>Nome do subgrupo</label><input id="nf-name" placeholder="Ex: Meditação"/></div>
    <div class="field"><label>Frente (grupo maior)</label>
      <select id="nf-grupo">${gruposEdit.map(g=>`<option value="${g.id}">${g.icon} ${g.label}</option>`).join('')}</select>
    </div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:10px">A cor será herdada automaticamente da frente escolhida.</div>
    <button class="btn" style="width:100%;margin-bottom:8px" onclick="addFrente()">+ Criar subgrupo</button>
    <button class="btn btn-outline" style="width:100%" onclick="closeModal()">Fechar</button>`;
}

function startEditFrente(fid){
  editingFrenteId=fid;
  const f=frentes.find(f=>f.id===fid);
  const gruposEdit=grupos.filter(g=>g.id!=='todas');
  const c=document.getElementById('config-section');
  c.innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <button class="btn btn-outline btn-sm" onclick="renderFrentesConfig()">← Voltar</button>
      <strong style="font-size:14px">Editar subgrupo</strong>
    </div>
    <div class="field"><label>Nome</label><input id="ef-name" value="${f.title}"/></div>
    <div class="field"><label>Frente (grupo maior)</label>
      <select id="ef-grupo">${gruposEdit.map(g=>`<option value="${g.id}" ${f.grupo===g.id?'selected':''}>${g.icon} ${g.label}</option>`).join('')}</select>
    </div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:10px">A cor é herdada da frente escolhida.</div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="renderFrentesConfig()">Cancelar</button>
      <button class="btn" onclick="saveFrente2()">Salvar</button>
    </div>`;
}

function saveFrente2(){
  const f=frentes.find(f=>f.id===editingFrenteId);if(!f)return;
  f.title=(document.getElementById('ef-name').value||f.title).trim();
  f.grupo=document.getElementById('ef-grupo').value;
  saveFrente();renderFrentesConfig();renderTabs();renderDash();
  if(activeView==='plan')renderPlan();
}

function addFrente(){
  const name=(document.getElementById('nf-name').value||'').trim();
  const grupo=document.getElementById('nf-grupo').value;
  if(!name){alert('Digite o nome do subgrupo');return;}
  const nf={id:'f'+uid(),title:name,grupo,open:false};
  frentes.push(nf);tasks[nf.id]=[];
  saveFrente();saveTasks();
  renderFrentesConfig();renderTabs();renderDash();
}

function deleteFrente(fid){
  const cnt=(tasks[fid]||[]).length;
  let msg=`Excluir este subgrupo?`;
  if(cnt>0){
    msg+=`\n\n${cnt} tarefa(s) serão mantidas em "Sem subgrupo" até que você as reatribua.`;
  }
  if(!confirm(msg))return;

  // Move tarefas para subgrupo órfão em vez de apagar
  if(cnt>0){
    ensureOrphanFrente();
    const orphanTasks=tasks['sem-subgrupo']||[];
    (tasks[fid]||[]).forEach(t=>orphanTasks.push(t));
    tasks['sem-subgrupo']=orphanTasks;
  }

  frentes=frentes.filter(f=>f.id!==fid);
  delete tasks[fid];
  saveFrente();saveTasks();
  renderFrentesConfig();renderMetrics();renderTabs();renderDash();
  if(activeView==='plan')renderPlan();
}

// Garante que existe o grupo/subgrupo órfão
function ensureOrphanGroup(){
  if(!grupos.find(g=>g.id==='sem-frente')){
    grupos.push({id:'sem-frente',label:'Sem frente',icon:'⚠️',color:'#888780'});
    saveGrupos();
  }
}
function ensureOrphanFrente(){
  ensureOrphanGroup();
  if(!frentes.find(f=>f.id==='sem-subgrupo')){
    frentes.push({id:'sem-subgrupo',title:'Sem subgrupo',grupo:'sem-frente',open:true});
    saveFrente();
  }
  if(!tasks['sem-subgrupo'])tasks['sem-subgrupo']=[];
}

// ── INIT ─────────────────────────────────────────────────
document.getElementById('hdr-date').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
renderMetrics();renderPesoCard();renderTabs();renderDash();
</script>
</body>
</html>
